<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Toolbox</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --surface: rgba(255, 255, 255, 0.82);
        --text: #1f1a17;
        --muted: #62564d;
        --accent: #0a7f5a;
        --border: rgba(31, 26, 23, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(10, 127, 90, 0.14),
            transparent 30%
          ),
          linear-gradient(180deg, #f8f4ee 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        min-height: 100vh;
        padding: 72px 24px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.5rem, 6vw, 4.25rem);
      }

      p {
        max-width: 58ch;
        line-height: 1.6;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
        margin-top: 40px;
      }

      .card {
        display: block;
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--surface);
        backdrop-filter: blur(10px);
        color: inherit;
        text-decoration: none;
        transition:
          transform 160ms ease,
          border-color 160ms ease;
      }

      .card:hover,
      .card:focus-visible {
        transform: translateY(-3px);
        border-color: rgba(10, 127, 90, 0.45);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.8rem;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 1.45rem;
      }

      .card p {
        margin: 0;
        font-size: 0.98rem;
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <p class="eyebrow">frontend-lab</p>
      <h1>HTML Toolbox</h1>
      <p class="intro">Sammlung von Alltagshelferlein</p>

      <section class="grid" aria-label="Themen">
        <a class="card" href="./geoJsonEditor/index.html">
          <h2>Geojson editor</h2>
          <p>
            Ein einfaches Tool, um Geojson-Daten zu bearbeiten und zu
            visualisieren.
          </p>
        </a>
      </section>
    </main>
  </body>
</html>
