<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaflet + JSON Editor Scaffold</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"
    />

    <style>
      :root {
        --border: #d9d9de;
        --bg: #f7f7f8;
        --panel: #ffffff;
        --text: #1f2328;
        --muted: #6b7280;
        --accent: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .app {
        display: grid;
        grid-template-columns: 1fr 420px;
        height: 100vh;
      }

      .map-panel,
      .editor-panel {
        min-height: 0;
      }

      .map-panel {
        position: relative;
        border-right: 1px solid var(--border);
        background: #e5e7eb;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      .editor-panel {
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        background: var(--panel);
      }

      .panel-section {
        padding: 12px;
        border-bottom: 1px solid var(--border);
      }

      .panel-title {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 700;
      }

      .panel-text {
        margin: 0;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.4;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid var(--border);
        background: #fff;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
      }

      button:hover {
        border-color: var(--accent);
      }

      button.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      textarea {
        width: 100%;
        height: 100%;
        border: 0;
        resize: none;
        padding: 14px;
        font:
          12px/1.5 ui-monospace,
          SFMono-Regular,
          Menlo,
          Consolas,
          monospace;
        outline: none;
      }

      .status {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        font-size: 12px;
        color: var(--muted);
      }

      .status strong {
        color: var(--text);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        background: #eef2ff;
        color: #3730a3;
        font-size: 12px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="map-panel">
        <div id="map"></div>
      </section>

      <aside class="editor-panel">
        <div class="panel-section">
          <h2 class="panel-title">GeoJSON</h2>
          <p class="panel-text">
            Globale Source of Truth: <strong>window.appState.geojson</strong>
          </p>
        </div>

        <div class="panel-section">
          <div class="toolbar">
            <button id="load-sample" type="button">Sample laden</button>
            <button id="apply-json" class="primary" type="button">
              JSON anwenden
            </button>
            <button id="format-json" type="button">Formatieren</button>
            <button id="clear-all" type="button">Leeren</button>
          </div>
        </div>

        <div class="editor-area">
          <textarea id="json-editor" spellcheck="false"></textarea>
        </div>

        <div class="panel-section">
          <div class="status">
            <span id="status-text">Bereit</span>
            <span class="badge" id="feature-count">0 Features</span>
          </div>
        </div>
      </aside>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

    <script>
      window.appState = {
        geojson: {
          type: "FeatureCollection",
          features: [],
        },
      };

      const sampleGeojson = {
        type: "FeatureCollection",
        features: [
          {
            type: "Feature",
            id: "feature-1",
            properties: {
              featureType: "point",
              label: "Kiel",
            },
            geometry: {
              type: "Point",
              coordinates: [10.1228, 54.3233],
            },
          },
          {
            type: "Feature",
            id: "feature-2",
            properties: {
              featureType: "route",
              label: "Beispielroute",
            },
            geometry: {
              type: "LineString",
              coordinates: [
                [10.1228, 54.3233],
                [10.15, 54.33],
                [10.18, 54.34],
              ],
            },
          },
          {
            type: "Feature",
            id: "feature-3",
            properties: {
              featureType: "geofence",
              label: "Beispielzone",
            },
            geometry: {
              type: "Polygon",
              coordinates: [
                [
                  [10.09, 54.31],
                  [10.14, 54.31],
                  [10.14, 54.34],
                  [10.09, 54.34],
                  [10.09, 54.31],
                ],
              ],
            },
          },
        ],
      };

      const editor = document.getElementById("json-editor");
      const statusText = document.getElementById("status-text");
      const featureCount = document.getElementById("feature-count");
      const loadSampleButton = document.getElementById("load-sample");
      const applyJsonButton = document.getElementById("apply-json");
      const formatJsonButton = document.getElementById("format-json");
      const clearAllButton = document.getElementById("clear-all");

      const map = L.map("map").setView([54.3233, 10.1228], 12);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap-Mitwirkende",
      }).addTo(map);

      const drawnItems = new L.FeatureGroup();
      map.addLayer(drawnItems);

      const drawControl = new L.Control.Draw({
        edit: {
          featureGroup: drawnItems,
          remove: true,
        },
        draw: {
          rectangle: false,
          circle: false,
          circlemarker: false,
          marker: {
            repeatMode: false,
          },
          polyline: {
            shapeOptions: {
              weight: 4,
            },
          },
          polygon: {
            allowIntersection: false,
            showArea: true,
          },
        },
      });
      map.addControl(drawControl);

      let featureIdCounter = 1;

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function isFeatureCollection(value) {
        return (
          value &&
          value.type === "FeatureCollection" &&
          Array.isArray(value.features)
        );
      }

      function setStatus(message, isError = false) {
        statusText.textContent = message;
        statusText.style.color = isError ? "#b42318" : "";
      }

      function updateFeatureCount() {
        const count = window.appState.geojson.features.length;
        featureCount.textContent = `${count} Feature${count === 1 ? "" : "s"}`;
      }

      function syncEditorFromState() {
        editor.value = JSON.stringify(window.appState.geojson, null, 2);
        updateFeatureCount();
      }

      function getNextFeatureId() {
        const id = `feature-${featureIdCounter}`;
        featureIdCounter += 1;
        return id;
      }

      function syncFeatureIdCounter() {
        const numericIds = window.appState.geojson.features
          .map((feature) => String(feature.id || ""))
          .map((id) => Number(id.replace("feature-", "")))
          .filter((value) => Number.isFinite(value));

        const maxId = numericIds.length ? Math.max(...numericIds) : 0;
        featureIdCounter = maxId + 1;
      }

      function inferFeatureType(geometryType) {
        if (geometryType === "Point") return "point";
        if (geometryType === "LineString") return "route";
        if (geometryType === "Polygon") return "geofence";
        return "feature";
      }

      function ensureFeatureDefaults(feature) {
        const nextFeature = clone(feature);

        if (!nextFeature.id) {
          nextFeature.id = getNextFeatureId();
        }

        nextFeature.properties = nextFeature.properties || {};

        if (!nextFeature.properties.featureType && nextFeature.geometry?.type) {
          nextFeature.properties.featureType = inferFeatureType(
            nextFeature.geometry.type,
          );
        }

        return nextFeature;
      }

      function bindLayerPopup(layer, feature) {
        const label =
          feature?.properties?.label ||
          feature?.properties?.featureType ||
          "Feature";
        layer.bindPopup(label);
      }

      function layerToFeature(layer) {
        const raw = layer.toGeoJSON();
        const feature = ensureFeatureDefaults(raw);
        feature.id = layer.__featureId || feature.id;
        feature.properties = {
          ...(feature.properties || {}),
          featureType:
            feature.properties?.featureType ||
            inferFeatureType(feature.geometry?.type),
        };
        return feature;
      }

      function renderMapFromState() {
        drawnItems.clearLayers();

        window.appState.geojson.features.forEach((feature) => {
          const normalizedFeature = ensureFeatureDefaults(feature);
          const layer = L.geoJSON(normalizedFeature, {
            pointToLayer(innerFeature, latlng) {
              return L.marker(latlng);
            },
          });

          layer.eachLayer((childLayer) => {
            childLayer.__featureId = normalizedFeature.id;
            childLayer.feature = clone(normalizedFeature);
            bindLayerPopup(childLayer, normalizedFeature);
            drawnItems.addLayer(childLayer);
          });
        });

        const bounds = drawnItems.getBounds();
        if (bounds.isValid()) {
          map.fitBounds(bounds, { padding: [20, 20] });
        }
      }

      function setGeojson(nextGeojson) {
        const normalized = {
          type: "FeatureCollection",
          features: nextGeojson.features.map(ensureFeatureDefaults),
        };

        window.appState.geojson = clone(normalized);
        syncFeatureIdCounter();
        syncEditorFromState();
        renderMapFromState();
      }

      function addFeature(feature) {
        const normalized = ensureFeatureDefaults(feature);
        window.appState.geojson.features.push(clone(normalized));
        syncFeatureIdCounter();
        syncEditorFromState();
      }

      function updateFeature(updatedFeature) {
        const normalized = ensureFeatureDefaults(updatedFeature);
        window.appState.geojson.features = window.appState.geojson.features.map(
          (feature) =>
            feature.id === normalized.id ? clone(normalized) : feature,
        );
        syncEditorFromState();
      }

      function removeFeature(featureId) {
        window.appState.geojson.features =
          window.appState.geojson.features.filter(
            (feature) => feature.id !== featureId,
          );
        syncEditorFromState();
      }

      function applyEditorToState() {
        try {
          const parsed = JSON.parse(editor.value);

          if (!isFeatureCollection(parsed)) {
            throw new Error("JSON muss eine GeoJSON FeatureCollection sein.");
          }

          setGeojson(parsed);
          setStatus("JSON erfolgreich angewendet.");
        } catch (error) {
          setStatus(error.message || "Ungültiges JSON.", true);
        }
      }

      map.on(L.Draw.Event.CREATED, (event) => {
        const layer = event.layer;
        const feature = layerToFeature(layer);

        layer.__featureId = feature.id;
        layer.feature = clone(feature);
        bindLayerPopup(layer, feature);

        drawnItems.addLayer(layer);
        addFeature(feature);
        setStatus(`Feature erstellt: ${feature.properties.featureType}`);
      });

      map.on(L.Draw.Event.EDITED, (event) => {
        event.layers.eachLayer((layer) => {
          const feature = layerToFeature(layer);
          layer.feature = clone(feature);
          bindLayerPopup(layer, feature);
          updateFeature(feature);
        });

        renderMapFromState();
        setStatus("Änderungen übernommen.");
      });

      map.on(L.Draw.Event.DELETED, (event) => {
        event.layers.eachLayer((layer) => {
          if (layer.__featureId) {
            removeFeature(layer.__featureId);
          }
        });

        renderMapFromState();
        setStatus("Feature entfernt.");
      });

      loadSampleButton.addEventListener("click", () => {
        setGeojson(sampleGeojson);
        setStatus("Beispiel geladen.");
      });

      applyJsonButton.addEventListener("click", applyEditorToState);

      formatJsonButton.addEventListener("click", () => {
        try {
          const parsed = JSON.parse(editor.value);
          editor.value = JSON.stringify(parsed, null, 2);
          setStatus("JSON formatiert.");
        } catch (error) {
          setStatus("Formatieren nicht möglich: ungültiges JSON.", true);
        }
      });

      clearAllButton.addEventListener("click", () => {
        setGeojson({
          type: "FeatureCollection",
          features: [],
        });
        setStatus("Alle Features entfernt.");
      });

      editor.addEventListener("input", () => {
        statusText.textContent = "Ungespeicherte Änderungen im Editor";
        statusText.style.color = "";
      });

      syncEditorFromState();
      renderMapFromState();
    </script>
  </body>
</html>
