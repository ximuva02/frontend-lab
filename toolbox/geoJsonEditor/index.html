<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaflet + JSON Editor Scaffold</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <section class="map-panel">
        <div id="map"></div>
      </section>

      <aside class="editor-panel">
        <div class="panel-section">
          <h2 class="panel-title">GeoJSON</h2>
          <p class="panel-text">
            Globale Source of Truth: <strong>window.appState.geojson</strong>
          </p>
        </div>

        <div class="panel-section">
          <div class="toolbar">
            <button id="load-sample" type="button">Sample laden</button>
            <button id="apply-json" class="primary" type="button">
              JSON anwenden
            </button>
            <button id="format-json" type="button">Formatieren</button>
            <button id="clear-all" type="button">Leeren</button>
          </div>
        </div>

        <div class="editor-area">
          <textarea id="json-editor" spellcheck="false"></textarea>
        </div>

        <div class="panel-section">
          <div class="status">
            <span id="status-text">Bereit</span>
            <span class="badge" id="feature-count">0 Features</span>
          </div>
        </div>
      </aside>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script type="module" src="./scripts/app.js"></script>
  </body>
</html>
